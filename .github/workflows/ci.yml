name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install --require-hashes -r requirements-ci.txt
      - name: Lint
        run: ruff check passclip.py tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-ci.txt
          pip install -e . --no-deps
      - name: Run tests
        run: python -m pytest tests/ -v

  credential-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - name: Install credactor
        run: pip install credactor
      - name: Scan for credentials
        run: credactor --ci --format sarif . > results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c  # v4.34.1
        if: always()
        with:
          sarif_file: results.sarif

  build-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          pip install --require-hashes -r requirements-ci.txt
          python -m build
      - name: Audit wheel for supply chain attacks
        run: python scripts/audit_wheel.py
      - name: Scan dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements-ci.txt --ignore-vuln CVE-2026-4539  # Pygments AdlLexer ReDoS — transitive dep, unreachable from Passclip
