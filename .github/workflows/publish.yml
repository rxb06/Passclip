name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          pip install --require-hashes -r requirements-ci.txt
          python -m build

      - name: Audit wheel for supply chain attacks
        run: python scripts/audit_wheel.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # Docker action — SHA pins don't resolve for container images
        with:
          attestations: true
